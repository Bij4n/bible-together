      translations_label: Traducciones
      support_label: Apoyo
      para_1: "Bible Together es un lector para quienes marcan su Biblia: resaltados, notas y una capa comunitaria cuando quieres leer con otros."
      para_2: El versículo que te detiene probablemente también detuvo a alguien más.
      para_3: Leer lo que significó para ellos, y luego escribir lo que significó para ti, es el punto entero.
      para_4: KJV en inglés y RV1909 en español están disponibles. La interfaz es bilingüe. Ambas traducciones son de dominio público.
      para_5: Hecho y mantenido por una sola persona. El alojamiento funciona con donaciones. Sin suscripción, sin anuncios, sin rastreo.
    donate_cta:
      heading: Manténlo abierto
      body: Bible Together es autofinanciado por su desarrollador, un seguidor de Jesús. Si te ha servido, ayuda a cubrir el alojamiento para que la Escritura siga libre—sin anuncios ni rastreo.
